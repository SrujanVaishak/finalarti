name: Self-Learning Algo (20-Hour Run)

on:
  workflow_dispatch:
  schedule:
    - cron: '15 3 * * 1-5'

jobs:
  run-algo:
    runs-on: ubuntu-latest
    timeout-minutes: 2000

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'  # ✅ Changed from 3.11 to 3.9

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Self-Learning Algo
      env:
        API_KEY: ${{ secrets.API_KEY }}
        CLIENT_CODE: ${{ secrets.CLIENT_CODE }}
        PASSWORD: ${{ secrets.PASSWORD }}
        TOTP_SECRET: ${{ secrets.TOTP_SECRET }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: |
        echo "🏁 STARTING SELF-LEARNING ALGO at $(TZ='Asia/Kolkata' date)"
        python ultimate_algo.py

    - name: Upload learning data as artifact
      uses: actions/upload-artifact@v4
      with:
        name: self-learning-data
        path: self_learning_data.json
        retention-days: 90

    - name: Notify completion
      run: |
        echo "✅ Self-learning algo completed at $(TZ='Asia/Kolkata' date)"
